server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_frms_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:4200

  integration:
    frms:
      base-url: http://localhost:8083
    ai:
      base-url: http://localhost:8000