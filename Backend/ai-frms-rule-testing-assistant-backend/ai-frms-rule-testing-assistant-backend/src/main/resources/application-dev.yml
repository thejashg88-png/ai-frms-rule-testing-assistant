server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_frms_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver










































  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:4200

  jwt:
    secret: frms-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-2024
    expiration-ms: 86400000

  integration:
    frms:
      base-url: http://localhost:8083
      evaluate-risk-path: /frm/evaluateRisk
      rule-by-id-path: /frm/rules/{ruleId}

    ai:
      base-url: http://localhost:8000
      generate-test-cases-path: /api/ai/generate-test-cases
      analyze-failure-path: /api/ai/analyze-failure
      explain-rule-path: /api/ai/explain-rule
      generate-transaction-path: /api/ai/generate-transaction
      generate-rule-path: /api/ai/generate-rule
      chat-path: /api/ai/chat

  report:
    output-dir: reports

  scheduler:
    poll-interval-ms: 60000